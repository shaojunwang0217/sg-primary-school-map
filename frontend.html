<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SG Primary School Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100dvh; overflow: hidden; background: #f0f2f5; }

/* ===== MAP ===== */
#map { width: 100%; height: 100dvh; z-index: 1; }

/* ===== SIDEBAR (hidden on mobile) ===== */
#sidebar { display: contents; }

/* ===== TOP SEARCH BAR (mobile floating) ===== */
#top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 1001; padding: 8px 12px; background: linear-gradient(to bottom, rgba(255,255,255,0.98) 85%, rgba(255,255,255,0)); pointer-events: none; }
#top-bar > * { pointer-events: auto; }
#search-row { display: flex; gap: 8px; align-items: center; background: #fff; border-radius: 12px; padding: 4px 4px 4px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
#search-box { flex: 1; border: none; padding: 10px 0; font-size: 16px; outline: none; background: transparent; color: #1a1a2e; }
#search-box::placeholder { color: #999; }
#locate-btn { background: #4361ee; color: #fff; border: none; width: 40px; height: 40px; border-radius: 10px; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
#locate-btn:active { background: #3451d1; }
#stats-bar { display: flex; justify-content: space-between; padding: 6px 14px 0; font-size: 12px; color: rgba(255,255,255,0.9); text-shadow: 0 1px 3px rgba(0,0,0,0.5); pointer-events: none; }

/* ===== FILTER STRIP (mobile floating) ===== */
#filter-strip { position: fixed; top: 80px; left: 0; right: 0; z-index: 1000; padding: 0 12px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
#filter-strip::-webkit-scrollbar { display: none; }
#filter-strip-inner { display: inline-flex; gap: 6px; padding: 6px 0; }
.filter-btn { padding: 7px 16px; border-radius: 20px; border: none; background: rgba(255,255,255,0.92); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.12); color: #444; }
.filter-btn:active { transform: scale(0.96); }
.filter-btn.active { background: #4361ee; color: #fff; box-shadow: 0 2px 8px rgba(67,97,238,0.3); }

/* ===== BOTTOM SHEET (mobile) ===== */
#bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1002; background: #fff; border-radius: 16px 16px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.12); max-height: 50dvh; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); touch-action: pan-y; }
#bottom-sheet.collapsed { transform: translateY(calc(100% - 48px)); }
#sheet-handle { display: flex; justify-content: center; padding: 10px 0 6px; cursor: grab; flex-shrink: 0; touch-action: none; }
#sheet-handle-bar { width: 40px; height: 4px; background: #ddd; border-radius: 2px; }
#sheet-results-header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px 8px; flex-shrink: 0; }
#sheet-results-header h2 { font-size: 15px; color: #1a1a2e; font-weight: 600; }
#sheet-results-header span { font-size: 12px; color: #888; }
#postal-bar { display: none; gap: 6px; padding: 0 16px 8px; align-items: center; flex-shrink: 0; }
#postal-input { flex: 1; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; outline: none; }
#postal-input:focus { border-color: #4361ee; }
#postal-btn { padding: 10px 18px; background: #4361ee; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; }
#sheet-results { flex: 1; overflow-y: auto; padding: 0 12px 12px; -webkit-overflow-scrolling: touch; }

/* ===== SCHOOL CARDS ===== */
.school-card { display: flex; align-items: flex-start; gap: 10px; padding: 12px; border-radius: 12px; margin-bottom: 6px; background: #f8f9fa; cursor: pointer; transition: all 0.1s; }
.school-card:active { background: #eef0f5; transform: scale(0.98); }
.school-card.active { background: #eef2ff; }
.school-pin { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.school-info { flex: 1; min-width: 0; }
.school-name { font-weight: 600; font-size: 14px; color: #1a1a2e; }
.school-meta { font-size: 12px; color: #666; margin-top: 2px; display: flex; flex-wrap: wrap; gap: 3px; align-items: center; }
.school-addr { font-size: 11px; color: #999; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ballot-chips { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
.ballot-chip { padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; line-height: 1.5; }
.ballot-chip.ballot { background: #fce8e6; color: #c5221f; }
.ballot-chip.open { background: #e6f4ea; color: #137333; }
.tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 500; }
.tag-sap { background: #fce8e6; color: #c5221f; }
.tag-affiliated { background: #fef7e0; color: #b06000; }
.tag-t1 { background: #fce8e6; color: #c5221f; }
.tag-t2 { background: #fef7e0; color: #b06000; }
.tag-girls { background: #f3e8fd; color: #7c3aed; }
.tag-boys { background: #e3f2fd; color: #1565c0; }
.tag-aided { background: #e6f4ea; color: #137333; }
.tag-govt { background: #e8f0fe; color: #1967d2; }
.dist-note { font-size: 11px; color: #666; margin-top: 2px; }

/* ===== LOADING / EMPTY ===== */
.loading { padding: 30px; text-align: center; color: #999; font-size: 13px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #eee; border-top-color: #4361ee; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 40px 20px; color: #999; }
.empty-state .icon { font-size: 40px; margin-bottom: 8px; }
.empty-state p { font-size: 13px; line-height: 1.6; }

/* ===== DETAIL OVERLAY (full screen on mobile) ===== */
#detail-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: #fff; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#detail-overlay.open { display: block; }
#detail-header { position: sticky; top: 0; z-index: 1; background: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; min-height: 56px; }
#detail-back { background: #f0f0f0; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#detail-name { font-size: 16px; font-weight: 600; color: #1a1a2e; }
#detail-body { padding: 16px; }
.dt-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
.dt-row .lbl { color: #888; }
.dt-row .val { font-weight: 500; color: #333; text-align: right; max-width: 60%; }
.dt-sec { margin-top: 20px; }
.dt-sec h3 { font-size: 14px; margin-bottom: 10px; color: #333; border-bottom: 2px solid #4361ee; padding-bottom: 4px; display: inline-block; }
.dt-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.dt-table th { text-align: left; padding: 8px 6px; font-weight: 600; font-size: 11px; color: #666; background: #f8f9fa; border-bottom: 1px solid #eee; }
.dt-table td { padding: 8px 6px; border-bottom: 1px solid #f0f0f0; }
.ballot-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 11px; }
.ballot-badge.bad { background: #fce8e6; color: #c5221f; }
.ballot-badge.good { background: #e6f4ea; color: #137333; }
.ballot-na { color: #bbb; }
.nearby-list { display: flex; flex-wrap: wrap; gap: 6px; }
.nearby-item { background: #f0f4ff; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
.nearby-item:active { background: #e0e8ff; }
.action-btn { display: inline-block; padding: 10px 20px; background: #4361ee; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 10px; width: 100%; text-align: center; text-decoration: none; }
.action-btn:active { background: #3451d1; }
.action-btn.outline { background: #f0f2f5; color: #4361ee; }

/* ===== DESKTOP LAYOUT (min-width: 768px) ===== */
@media (min-width: 768px) {
  body { display: flex; flex-direction: row; }
  
  #sidebar { display: flex; flex-direction: column; width: 420px; background: #fff; border-right: 1px solid #e0e0e0; }
  
  
  #top-bar { position: static; padding: 16px; background: #fff; }
  #search-row { box-shadow: none; background: #f0f2f5; padding: 0 4px 0 14px; border-radius: 10px; }
  #stats-bar { display: none; }
  
  #filter-strip { position: static; padding: 0 16px; border-bottom: 1px solid #eee; background: #fff; }
  #filter-strip-inner { padding: 8px 0; }
  .filter-btn { background: #fff; border: 1px solid #ddd; box-shadow: none; }
  
  #bottom-sheet { position: static; border-radius: 0; box-shadow: none; max-height: none; flex: 1; display: flex; flex-direction: column; background: #fff; }
  #bottom-sheet.collapsed { transform: none; }
  #sheet-handle { display: none; }
  #sheet-results-header { padding: 10px 16px; }
  
  #map { flex: 1; height: 100dvh; }
  
  #detail-overlay { position: fixed; top: 0; right: 0; width: 480px; height: 100dvh; border-left: 1px solid #e0e0e0; box-shadow: -4px 0 20px rgba(0,0,0,0.1); }
}
</style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <!-- TOP SEARCH BAR -->
  <div id="top-bar">
    <div id="search-row">
      <input type="text" id="search-box" placeholder="🔍 Search school or address..." />
      <button id="locate-btn" title="Find schools near me">📍</button>
    </div>
    <div id="stats-bar">
      <span id="stat-count">186 schools</span>
      <span id="stat-note"></span>
    </div>
  </div>

  <!-- FILTER STRIP -->
  <div id="filter-strip">
    <div id="filter-strip-inner">
      <button class="filter-btn active" data-f="all">All</button>
      <button class="filter-btn" data-f="tier1">⭐ Elite</button>
      <button class="filter-btn" data-f="tier2">📈 Popular</button>
      <button class="filter-btn" data-f="sap">📖 SAP</button>
      <button class="filter-btn" data-f="affiliated">🔗 Affiliated</button>
      <button class="filter-btn" data-f="girls">👧 Girls</button>
      <button class="filter-btn" data-f="boys">👦 Boys</button>
      <button class="filter-btn" data-f="postal">📍 Postal</button>
    </div>
  </div>

  <!-- BOTTOM SHEET -->
  <div id="bottom-sheet">
    <div id="sheet-handle"><div id="sheet-handle-bar"></div></div>
    <div id="sheet-results-header">
      <h2>Schools</h2>
      <span id="result-count"></span>
    </div>
    <div id="postal-bar">
      <input type="text" id="postal-input" placeholder="Enter 6-digit postal code" maxlength="6" inputmode="numeric" />
      <button id="postal-btn">Go</button>
    </div>
    <div id="sheet-results">
      <div class="loading"><div class="spinner"></div><br/>Loading schools...</div>
    </div>
  </div>

</div><!-- /sidebar -->

<!-- DETAIL OVERLAY -->
<div id="detail-overlay">
  <div id="detail-header">
    <button id="detail-back">←</button>
    <span id="detail-name">School</span>
  </div>
  <div id="detail-body"></div>
</div>

<script>
const API = window.location.origin;
let allSchools = [];
let markers = [];
let userMarkers = [];
let activeFilter = 'all';
let searchTerm = '';
let userLat = null, userLng = null;
let activeSchoolId = null;
let map = null;
let isInitialLoad = true;

function initMap() {
  map = L.map('map', {
    zoomControl: window.innerWidth > 768,
    attributionControl: window.innerWidth > 500
  }).setView([1.3521, 103.8198], 11);
  
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
  
  map.on('click', function(e) {
    searchNearby(e.latlng.lat.toFixed(6), e.latlng.lng.toFixed(6));
  });
  map.whenReady(() => { setTimeout(() => map.invalidateSize(), 200); });
}

async function fetchSchools() {
  try {
    const resp = await fetch(`${API}/api/schools`);
    const data = await resp.json();
    allSchools = data.schools || [];
    document.getElementById('result-count').textContent = `${allSchools.length} schools`;
    applyFilters();
  } catch(e) {
    document.getElementById('sheet-results').innerHTML =
      '<div class="empty-state"><div class="icon">😔</div><p>Could not load schools.<br/>Make sure the server is running.</p></div>';
  }
}

function addMarkers(filtered) {
  markers.forEach(m => map.removeLayer(m));
  userMarkers.forEach(m => map.removeLayer(m));
  markers = [];
  userMarkers = [];
  
  const list = filtered || allSchools;
  const colors = {1:'#c5221f',2:'#b06000',3:'#1967d2',4:'#137333',5:'#999'};
  
  list.forEach(s => {
    if (!s.lat || !s.lng) return;
    const color = colors[s.prestige_tier] || '#999';
    const m = L.circleMarker([s.lat, s.lng], {
      radius: 7, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.8
    });
    m.bindPopup(`<strong>${s.name}</strong><br/>${s.address||''}${s.ballot_summary ? '<br/>🎯 '+s.ballot_summary : ''}`);
    m.on('click', () => showDetail(s.id));
    m.addTo(map);
    markers.push(m);
  });
  
  if (userLat && userLng) {
    const um = L.marker([userLat, userLng], {
      icon: L.divIcon({className:'',html:'<span style="font-size:24px">📍</span>',iconSize:[24,24],iconAnchor:[12,24]})
    }).addTo(map);
    userMarkers.push(um);
  }
}

function applyFilters() {
  let filtered = [...allSchools];
  
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    filtered = filtered.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.address||'').toLowerCase().includes(q) ||
      (s.region||'').toLowerCase().includes(q)
    );
  }
  
  if (activeFilter === 'tier1') filtered = filtered.filter(s => (s.prestige_tier||99) <= 1);
  else if (activeFilter === 'tier2') filtered = filtered.filter(s => (s.prestige_tier||99) <= 2);
  else if (activeFilter === 'sap') filtered = filtered.filter(s => (s.tags||[]).includes('sap'));
  else if (activeFilter === 'affiliated') filtered = filtered.filter(s => (s.tags||[]).includes('affiliated'));
  else if (activeFilter === 'girls') filtered = filtered.filter(s => s.gender === 'Girls');
  else if (activeFilter === 'boys') filtered = filtered.filter(s => s.gender === 'Boys');
  
  filtered.sort((a, b) => (a.prestige_tier||99) - (b.prestige_tier||99) || a.name.localeCompare(b.name));
  
  renderList(filtered);
  
  if (!userLat) {
    addMarkers(filtered);
    if (markers.length > 0) {
      const group = L.featureGroup(markers);
      if (isInitialLoad) { map.fitBounds(group.getBounds().pad(0.05)); isInitialLoad = false; }
    }
  } else {
    addMarkers(filtered);
  }
  
  document.getElementById('result-count').textContent = `${filtered.length} of ${allSchools.length}`;
  if (filtered.length > 0 && searchTerm) expandSheet();
}

function renderList(schools) {
  const container = document.getElementById('sheet-results');
  if (schools.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No schools match.<br/>Try a different filter.</p></div>';
    return;
  }
  
  const colors = {1:'#c5221f',2:'#b06000',3:'#1967d2',4:'#137333',5:'#999'};
  
  let html = '';
  schools.forEach(s => {
    const tier = s.prestige_tier || 5;
    const tags = (s.tags||[]).map(t => {
      const m = {'sap':'tag-sap','affiliated':'tag-affiliated'};
      return `<span class="tag ${m[t]||''}">${t}</span>`;
    }).join('');
    const typeTag = s.type === 'Govt-Aided' ? '<span class="tag tag-aided">Aided</span>' : '<span class="tag tag-govt">Govt</span>';
    const genderTag = s.gender === 'Girls' ? '<span class="tag tag-girls">👧</span>' : s.gender === 'Boys' ? '<span class="tag tag-boys">👦</span>' : '';
    const tierTag = tier <= 1 ? '<span class="tag tag-t1">⭐ Elite</span>' : tier <= 2 ? '<span class="tag tag-t2">📈 Popular</span>' : '';
    
    let chips = '';
    if (s.ballots && s.ballots.length > 0) {
      const latest = s.ballots[s.ballots.length - 1];
      if (latest && latest.phases) {
        const lbl = {'2A':'2A','2A(1)':'2A①','2A(2)':'2A②','2B':'2B','2C':'2C','2C(S)':'S'};
        ['2A','2A(1)','2A(2)','2B','2C','2C(S)'].forEach(ph => {
          const pd = latest.phases[ph];
          if (pd && (pd.app!==null || pd.vac!==null)) {
            const isBallot = pd.app > pd.vac;
            chips += `<span class="ballot-chip ${isBallot?'ballot':'open'}">${lbl[ph]||ph} ${pd.app||0}/${pd.vac||0}</span>`;
          }
        });
        if (chips) chips = `<div class="ballot-chips">${latest.year} ${chips}</div>`;
      }
    }
    
    const distNote = s.distance_km ? `<div class="dist-note">📍 ${s.distance_km} km</div>` : '';
    
    html += `
      <div class="school-card ${activeSchoolId===s.id?'active':''}" data-id="${s.id}" onclick="showDetail('${s.id}')">
        <div class="school-pin" style="background:${colors[tier]}"></div>
        <div class="school-info">
          <div class="school-name">${s.name}</div>
          <div class="school-meta">${typeTag}${genderTag}${tierTag}${tags}${s.region ? '<span>· '+s.region+'</span>' : ''}</div>
          ${chips}
          ${distNote}
          <div class="school-addr">${(s.address||'').substring(0,40)}</div>
        </div>
      </div>`;
  });
  
  container.innerHTML = html;
}

async function showDetail(id) {
  activeSchoolId = id;
  expandSheet();
  
  const overlay = document.getElementById('detail-overlay');
  overlay.classList.add('open');
  document.getElementById('detail-name').textContent = 'Loading...';
  
  try {
    const resp = await fetch(`${API}/api/school?id=${id}`);
    const s = await resp.json();
    
    document.getElementById('detail-name').textContent = s.name;
    const tags = (s.tags||[]).map(t => `<span class="tag tag-${t}">${t}</span>`).join('');
    const tierLabel = {1:'⭐ Elite',2:'📈 Popular',3:'👍 Moderate',4:'✅ Open',5:'ℹ️ Limited'};
    const prestige = s.prestige || {};
    const ballots = s.ballots || [];
    
    let ballotHtml = '';
    if (ballots.length > 0) {
      const recent = ballots.filter(b => b.year >= 2020).reverse();
      const phaseOrder = ['2A','2A(1)','2A(2)','2B','2C','2C(S)'];
      ballotHtml = `<div class="dt-sec"><h3>📊 P1 Registration (2020–${recent[0]?.year||'latest'})</h3>
        <div style="overflow-x:auto"><table class="dt-table">
        <tr><th>Year</th>${phaseOrder.map(p => `<th>${p}</th>`).join('')}</tr>`;
      recent.forEach(b => {
        let row = `<tr><td><strong>${b.year}</strong></td>`;
        phaseOrder.forEach(ph => {
          const pd = (b.phases && b.phases[ph]) || {};
          if (pd.app===null || pd.app===undefined || pd.vac===null || pd.vac===undefined) {
            row += '<td><span class="ballot-na">—</span></td>';
          } else {
            const isBallot = pd.app > pd.vac;
            row += `<td><span class="ballot-badge ${isBallot?'bad':'good'}">${pd.app}/${pd.vac}</span></td>`;
          }
        });
        row += '</tr>';
        ballotHtml += row;
      });
      ballotHtml += '</table></div></div>';
    }
    
    let nearbyHtml = '';
    if (s.nearby_schools && s.nearby_schools.length > 0) {
      nearbyHtml = `<div class="dt-sec"><h3>📍 Nearby Schools</h3><div class="nearby-list">`;
      s.nearby_schools.forEach(n => {
        nearbyHtml += `<div class="nearby-item" onclick="showDetail('${n.id}')">${n.name} <small>${n.distance_km} km</small></div>`;
      });
      nearbyHtml += '</div></div>';
    }
    
    document.getElementById('detail-body').innerHTML = `
      <div class="dt-row"><span class="lbl">Type</span><span class="val">${s.type||'Government'}</span></div>
      <div class="dt-row"><span class="lbl">Gender</span><span class="val">${s.gender||'Co-Ed'}</span></div>
      <div class="dt-row"><span class="lbl">Region</span><span class="val">${s.region||'—'}</span></div>
      <div class="dt-row"><span class="lbl">Address</span><span class="val" style="font-size:12px">${s.address||'—'}</span></div>
      ${s.phone ? `<div class="dt-row"><span class="lbl">Phone</span><span class="val">${s.phone}</span></div>` : ''}
      <div class="dt-row"><span class="lbl">Tags</span><span class="val">${tags||'—'}</span></div>
      <div class="dt-row"><span class="lbl">Prestige</span><span class="val">${tierLabel[prestige.tier]||'Not rated'}</span></div>
      <div class="dt-row"><span class="lbl">Phase 2C</span><span class="val">${prestige.last_2c||'No data'}</span></div>
      ${ballotHtml}
      ${nearbyHtml}
      ${s.moe_url ? `<a href="${s.moe_url}" target="_blank" class="action-btn">📄 MOE School Page</a>` : ''}
      ${s.lat ? `<button class="action-btn outline" onclick="flyToSchool(${s.lat},${s.lng});document.getElementById('detail-overlay').classList.remove('open')">📍 View on Map</button>` : ''}
    `;
  } catch(e) {
    document.getElementById('detail-body').innerHTML = '<p style="color:red;text-align:center;padding:20px">Error loading details.</p>';
  }
}

function flyToSchool(lat, lng) {
  map.setView([lat, lng], 16);
  expandSheet();
}

async function searchNearby(lat, lng) {
  userLat = parseFloat(lat);
  userLng = parseFloat(lng);
  document.getElementById('sheet-results').innerHTML = '<div class="loading"><div class="spinner"></div><br/>Finding nearby schools...</div>';
  expandSheet();
  
  try {
    const resp = await fetch(`${API}/api/nearyou?lat=${lat}&lng=${lng}`);
    const data = await resp.json();
    if (data.schools && data.schools.length > 0) {
      renderList(data.schools);
      addMarkers(data.schools);
      if (markers.length > 0) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
      }
      document.getElementById('result-count').textContent = `${data.count} within 2km`;
    } else {
      document.getElementById('sheet-results').innerHTML = '<div class="empty-state"><div class="icon">🗺️</div><p>No schools within 2km.<br/>Click a different area.</p></div>';
    }
  } catch(e) { console.error(e); }
}

function getUserLocation() {
  if (!navigator.geolocation) {
    document.getElementById('sheet-results').innerHTML = '<div class="empty-state"><div class="icon">📍</div><p>Location not available.<br/>Click the map to search nearby.</p></div>';
    return;
  }
  document.getElementById('sheet-results').innerHTML = '<div class="loading"><div class="spinner"></div><br/>Getting your location...</div>';
  expandSheet();
  
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      activeFilter = 'all';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-f="all"]').classList.add('active');
      searchNearby(userLat, userLng);
    },
    () => {
      document.getElementById('sheet-results').innerHTML =
        '<div class="empty-state"><div class="icon">📍</div><p>Could not get location.<br/>Click the map or enter a postal code.</p></div>';
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

async function searchByPostal(code) {
  if (!code || code.length !== 6) return;
  document.getElementById('sheet-results').innerHTML = '<div class="loading"><div class="spinner"></div><br/>Searching postal code...</div>';
  expandSheet();
  
  try {
    const resp = await fetch(`${API}/api/postal?code=${code}`);
    const data = await resp.json();
    if (data.error) {
      document.getElementById('sheet-results').innerHTML = `<div class="empty-state"><div class="icon">😔</div><p>${data.error}</p></div>`;
      return;
    }
    userLat = data.lat;
    userLng = data.lng;
    if (data.schools && data.schools.length > 0) {
      renderList(data.schools);
      addMarkers(data.schools);
      if (markers.length > 0) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
      }
      document.getElementById('result-count').textContent = `${data.count} near ${code}`;
    } else {
      document.getElementById('sheet-results').innerHTML = '<div class="empty-state"><div class="icon">🗺️</div><p>No schools within 2km of this postal code.</p></div>';
    }
  } catch(e) {
    document.getElementById('sheet-results').innerHTML = '<div class="empty-state"><div class="icon">😔</div><p>Error searching postal code.</p></div>';
  }
}

// Bottom sheet drag
let sheetEl = document.getElementById('bottom-sheet');
let startY = 0, currentY = 0, dragging = false;
let sheetHandle = document.getElementById('sheet-handle');

sheetHandle.addEventListener('touchstart', function(e) {
  startY = e.touches[0].clientY;
  dragging = true;
  sheetEl.style.transition = 'none';
}, {passive: true});

document.addEventListener('touchmove', function(e) {
  if (!dragging) return;
  currentY = e.touches[0].clientY;
  let delta = currentY - startY;
  if (delta < 0) delta = 0;
  let sheetHeight = sheetEl.offsetHeight;
  let collapsedOffset = 48;
  let translate = Math.min(delta, sheetHeight - collapsedOffset);
  sheetEl.style.transform = 'translateY(' + translate + 'px)';
}, {passive: true});

document.addEventListener('touchend', function() {
  if (!dragging) return;
  dragging = false;
  sheetEl.style.transition = 'transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)';
  let delta = currentY - startY;
  let threshold = sheetEl.offsetHeight * 0.35;
  if (delta > threshold) {
    sheetEl.classList.add('collapsed');
  } else {
    sheetEl.classList.remove('collapsed');
  }
  sheetEl.style.transform = '';
}, {passive: true});

sheetHandle.addEventListener('click', function() {
  sheetEl.classList.toggle('collapsed');
});

function expandSheet() { sheetEl.classList.remove('collapsed'); }
function collapseSheet() { sheetEl.classList.add('collapsed'); }

document.getElementById('locate-btn').addEventListener('click', getUserLocation);
document.getElementById('detail-back').addEventListener('click', () => {
  document.getElementById('detail-overlay').classList.remove('open');
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.f;
    if (this.dataset.f === 'postal') {
      document.getElementById('postal-bar').style.display = 'flex';
      document.getElementById('postal-input').focus();
    } else {
      document.getElementById('postal-bar').style.display = 'none';
      userLat = null; userLng = null;
      isInitialLoad = true;
      applyFilters();
    }
  });
});

document.getElementById('postal-btn').addEventListener('click', () => searchByPostal(document.getElementById('postal-input').value.trim()));
document.getElementById('postal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchByPostal(e.target.value.trim());
});

let searchTimeout;
document.getElementById('search-box').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchTerm = this.value;
    if (!searchTerm) { userLat = null; userLng = null; isInitialLoad = true; }
    applyFilters();
  }, 300);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('detail-overlay').classList.remove('open');
});

window.addEventListener('resize', () => { map.invalidateSize(); });

initMap();
fetchSchools();
</script>
